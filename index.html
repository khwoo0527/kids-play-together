<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#04041a">
  <title>풍선 터트리기 🎈</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <button id="bgmToggle" title="배경음악 켜기/끄기">🎵</button>
  <button id="btnEnd" class="hidden">끝내기</button>

  <!-- 시작 화면 -->
  <div id="screen-ready" class="screen">
    <div class="screen-card">
      <div class="game-title">🎈 풍선 터트리기</div>

      <!-- 이름 입력 -->
      <div class="input-group">
        <p class="time-label">이름 입력</p>
        <input id="playerName" class="name-input" type="text" maxlength="8" placeholder="이름을 입력하세요" />
      </div>

      <!-- 아바타 선택 -->
      <div class="input-group">
        <p class="time-label">캐릭터 선택</p>
        <div class="avatar-btns" id="avatarBtns">
          <button class="avatar-btn active" data-avatar="🐶">🐶</button>
          <button class="avatar-btn" data-avatar="🐱">🐱</button>
          <button class="avatar-btn" data-avatar="🐸">🐸</button>
          <button class="avatar-btn" data-avatar="🦊">🦊</button>
          <button class="avatar-btn" data-avatar="🐼">🐼</button>
          <button class="avatar-btn" data-avatar="🦄">🦄</button>
        </div>
      </div>

      <!-- 시간 선택 -->
      <div class="input-group">
        <p class="time-label">시간 선택</p>
        <div class="time-btns">
          <button class="time-btn active" data-time="15">15초</button>
          <button class="time-btn" data-time="30">30초</button>
          <button class="time-btn" data-time="45">45초</button>
          <button class="time-btn" data-time="60">60초</button>
        </div>
      </div>


      <div class="start-bottom-row">
        <button id="btn-options" class="btn-option">⚙️ 옵션</button>
        <button id="btn-start" class="btn-main">시작! 🎈</button>
      </div>
    </div>
  </div>

  <!-- 옵션 모달 -->
  <div id="screen-options" class="screen hidden">
    <div class="screen-card options-card">
      <div class="options-title">⚙️ 옵션</div>

      <div class="input-group">
        <p class="time-label">풍선 수</p>
        <div class="time-btns opt-btns" id="optBalloonBtns">
          <button class="time-btn" data-count="5">5개</button>
          <button class="time-btn" data-count="10">10개</button>
          <button class="time-btn active" data-count="15">15개</button>
          <button class="time-btn" data-count="20">20개</button>
          <button class="time-btn" data-count="25">25개</button>
        </div>
      </div>

      <div class="input-group">
        <p class="time-label">풍선 속도</p>
        <div class="time-btns opt-btns" id="optSpeedBtns">
          <button class="time-btn" data-speed="slow">🐢 느리게</button>
          <button class="time-btn active" data-speed="normal">😊 보통</button>
          <button class="time-btn" data-speed="fast">🚀 빠르게</button>
        </div>
      </div>

      <button id="btn-options-close" class="btn-main">확인 ✅</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result" class="screen hidden">
    <div class="screen-card result-card">
      <div class="result-emoji">🎉</div>
      <div id="result-player" class="result-player"></div>
      <div class="result-title">게임 종료!</div>
      <div class="result-stats">
        <div class="stat">
          <div class="stat-val" id="r-score">0</div>
          <div class="stat-label">점수</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="r-combo">0</div>
          <div class="stat-label">최고 콤보</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="r-acc">100%</div>
          <div class="stat-label">정확도</div>
        </div>
      </div>

      <!-- 랭킹 TOP 20 -->
      <div class="ranking-box">
        <div class="ranking-header">
          <div class="ranking-title">🏆 TOP 20</div>
          <button id="btn-ranking-clear" class="btn-ranking-clear">🗑️ 초기화</button>
        </div>
        <ol id="ranking-list" class="ranking-list"></ol>
      </div>

      <button id="btn-restart" class="btn-main">다시하기 🎈</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ranking.js"></script>
  <script src="js/balloon.js"></script>
  <script src="js/input.js"></script>
  <script src="js/score.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
