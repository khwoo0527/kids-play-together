<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>풍선 터트리기 🎈</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <button id="bgmToggle" title="배경음악 켜기/끄기">🎵</button>

  <!-- 시작 화면 -->
  <div id="screen-ready" class="screen">
    <div class="screen-card">
      <div class="game-title">🎈 풍선 터트리기</div>
      <div class="time-select">
        <p class="time-label">시간 선택</p>
        <div class="time-btns">
          <button class="time-btn" data-time="30">30초</button>
          <button class="time-btn active" data-time="60">60초</button>
          <button class="time-btn" data-time="0">∞</button>
        </div>
      </div>
      <button id="btn-start" class="btn-main">시작! 🎈</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="screen-result" class="screen hidden">
    <div class="screen-card">
      <div class="result-emoji">🎉</div>
      <div class="result-title">게임 종료!</div>
      <div class="result-stats">
        <div class="stat">
          <div class="stat-val" id="r-score">0</div>
          <div class="stat-label">점수</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="r-combo">0</div>
          <div class="stat-label">최고 콤보</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="r-acc">100%</div>
          <div class="stat-label">정확도</div>
        </div>
      </div>
      <button id="btn-restart" class="btn-main">다시하기 🎈</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/game.js"></script>
  <script src="js/balloon.js"></script>
  <script src="js/input.js"></script>
  <script src="js/score.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
